version: "3.8"

services:
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka-kraft
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 5s
      retries: 6

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.8.0
    container_name: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      KAFKA_HEAP_OPTS: "-Xms2G -Xmx2G"
      CONNECT_BOOTSTRAP_SERVERS: 'kafka:29092'
      CONNECT_RECONNECT_BACKOFF_MS: 5000
      CONNECT_RECONNECT_BACKOFF_MAX_MS: 30000
      CONNECT_ADMIN_REQUEST_TIMEOUT_MS: 60000
      CONNECT_OFFSET_FLUSH_TIMEOUT_MS: 60000
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: "nigerian-fraud-group"
      CONNECT_OFFSET_STORAGE_TOPIC: "connect-offsets"
      CONNECT_CONFIG_STORAGE_TOPIC: "connect-configs"
      CONNECT_STATUS_STORAGE_TOPIC: "connect-status"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: 10000
      CONNECT_REBALANCE_TIMEOUT_MS: 60000
    command:
      - /bin/bash
      - -c
      - |
        # This installs the robust CSV connector on startup
        confluent-hub install --no-prompt jcustenborder/kafka-connect-spooldir:2.0.65
        /etc/confluent/docker/run
    volumes:
      - ./data:/data

  spark-master:
    build: .
    container_name: spark-master_fraud
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_NO_DAEMONIZE=true
      - PYTHONPATH=$PYTHONPATH:/opt/spark/work-dir
      - PYSPARK_PYTHON=/usr/bin/python3
      - PYSPARK_DRIVER_PYTHON=/usr/bin/python3
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - .:/opt/spark/work-dir # This maps your current folder to the container
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker:
    build: . 
    container_name: spark-worker_fraud
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=2G
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_NO_DAEMONIZE=true
      - PYSPARK_PYTHON=/usr/bin/python3
    depends_on:
      - spark-master
    volumes:
      - .:/opt/spark/work-dir
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  postgres_fraud:
    image: postgres:18
    container_name: postgres_fraud
    environment: 
      - POSTGRES_USER=admin 
      - POSTGRES_PASSWORD=puffpuff
      - POSTGRES_DB=fraud_db 
    ports:
      - "5432:5432"
    #networks:
    # - fraud_network

  pgadmin_fraud:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_fraud 
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@fraud.net 
      - PGADMIN_DEFAULT_PASSWORD=123456
    ports:
      - "2251:80"
    #networks:
    #  - fraud_network
    depends_on:
      - postgres_fraud